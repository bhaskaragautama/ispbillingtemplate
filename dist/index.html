<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Template</title>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/fontawesome/css/all.min.css" />
        <link rel="stylesheet" href="css/custom.css" />
    </head>
    <body class="bg-base overflow-hidden">
        <div class="container-fluid vh-100">
            <div class="row h-100">
                <div class="col-3 p-3 h-100">
                    <aside class="h-100 rounded-4 p-3 bg-light shadow-sm">
                        <div class="logo text-center pb-3 border-bottom">
                            <a href="#">
                                <img
                                    src="img/logo-sym.png"
                                    alt="Logo"
                                    class="w-25 d-inline-block d-block d-md-none"
                                />
                                <img
                                    src="img/logo.png"
                                    alt="Logo"
                                    class="w-75 d-inline-block"
                                />
                            </a>
                        </div>
                        <div class="py-3">
                            <a
                                href="#"
                                class="text-decoration-none aside-item text-secondary-emphasis d-block px-3 py-2 mb-2"
                            >
                                <i class="fas fa-dashboard me-3"></i> Dashboard
                            </a>
                            <a
                                href="#"
                                class="text-decoration-none aside-item d-block px-3 py-2 mb-2 bg-primary text-white rounded-pill active"
                            >
                                <i class="fas fa-diagram-project me-3"></i>
                                Projects
                            </a>
                            <a
                                href="#"
                                class="text-decoration-none aside-item text-secondary-emphasis d-block px-3 py-2 mb-2"
                            >
                                <i class="fas fa-list-check me-3"></i> Task List
                            </a>
                            <a
                                href="#"
                                class="text-decoration-none aside-item text-secondary-emphasis d-block px-3 py-2 mb-2"
                            >
                                <i class="fas fa-hand-holding-hand me-3"></i>
                                Services
                            </a>
                            <a
                                href="#"
                                class="text-decoration-none aside-item text-secondary-emphasis d-block px-3 py-2 mb-2 position-relative"
                            >
                                <i class="fas fa-bell me-3"></i> Notification
                                <span
                                    class="badge text-bg-success text-success-emphasis position-absolute end-0 me-2"
                                    >4</span
                                >
                            </a>
                            <a
                                href="#"
                                class="text-decoration-none aside-item text-secondary-emphasis d-block px-3 py-2 mb-2"
                            >
                                <i class="fas fa-message me-3"></i> Chats
                            </a>
                        </div>
                    </aside>
                </div>
                <div class="col-12 py-3 ps-0 h-100 d-flex flex-column">
                    <nav
                        class="navbar navbar-expand-lg rounded-4 p-2 bg-light mb-3 shadow-sm"
                    >
                        <div class="container-fluid">
                            <!-- <a class="navbar-brand" href="#">Navbar</a> -->
                            <button
                                class="navbar-toggler ms-auto"
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#navbarSupportedContent"
                                aria-controls="navbarSupportedContent"
                                aria-expanded="false"
                                aria-label="Toggle navigation"
                            >
                                <span class="navbar-toggler-icon"></span>
                            </button>
                            <div
                                class="collapse navbar-collapse"
                                id="navbarSupportedContent"
                            >
                                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                                    <li
                                        class="nav-item dropdown"
                                        data-bs-animation="fade"
                                    >
                                        <a
                                            class="nav-link dropdown-toggle fw-semibold active"
                                            href="#"
                                            role="button"
                                            data-bs-toggle="dropdown"
                                            aria-expanded="false"
                                        >
                                            <i class="fas fa-user-circle"></i>
                                            Username
                                        </a>
                                        <ul
                                            class="dropdown-menu dropdown-menu-end rounded-3 shadow"
                                        >
                                            <li>
                                                <a
                                                    class="dropdown-item"
                                                    href="#"
                                                    >Profile</a
                                                >
                                            </li>
                                            <li>
                                                <a
                                                    class="dropdown-item"
                                                    href="#"
                                                    >Settings</a
                                                >
                                            </li>
                                            <li>
                                                <a
                                                    class="dropdown-item"
                                                    href="#"
                                                    >Logout</a
                                                >
                                            </li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </nav>
                    <div class="flex-grow-1 text-light overflow-y-auto">
                        <div class="d-flex flex-column h-100">
                            <div class="flex-grow-1 content-container">
                                <h2 class="fw-semibold">Last tasks</h2>
                                <div class="table-container">
                                    <table class="table">
                                        <thead class="opacity-50">
                                            <tr>
                                                <th>
                                                    <input
                                                        type="checkbox"
                                                        name=""
                                                        id=""
                                                    />
                                                </th>
                                                <th>Name</th>
                                                <th>Admin</th>
                                                <th>Members</th>
                                                <th>Status</th>
                                                <th>Run Time</th>
                                                <th>Finish Date</th>
                                            </tr>
                                        </thead>
                                        <tbody class="fw-bolder">
                                            <tr>
                                                <td>
                                                    <input
                                                        type="checkbox"
                                                        name=""
                                                        id=""
                                                    />
                                                </td>
                                                <td>
                                                    ClientOnBoarding - Circle
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script
            src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"
        ></script>
        <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            $(document).ready(function () {
                $(".aside-item:not(.active)").hover(function () {
                    $(this).toggleClass(
                        "text-secondary-emphasis bg-primary text-white rounded-pill"
                    );
                });
            });
        </script>
    </body>
</html>
